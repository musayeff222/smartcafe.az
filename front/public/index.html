  <!-- Mobil DevTools (Eruda) - yalniz localhost/LAN IP-lərdə aktivdir, proddda yüklənmir -->
  <script>
    (function () {
      var h = location.hostname;
      var isDev =
        h === 'localhost' ||
        h === '127.0.0.1' ||
        /^192\.168\./.test(h) ||
        /^10\./.test(h) ||
        /^172\.(1[6-9]|2\d|3[01])\./.test(h);
      if (!isDev) return;
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.4.1/eruda.min.js';
      s.onload = function () { window.eruda && window.eruda.init(); };
      document.body.appendChild(s);
    })();
  </script>
</body>
